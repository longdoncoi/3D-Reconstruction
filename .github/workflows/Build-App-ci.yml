# ──────────────────────────────────────────────────────────────────────────────
# C++ CI — Build & Test
# Triggers on push/PR to main, skips docs-only changes.
# Uses aggressive caching to minimize build time and token usage.
# ──────────────────────────────────────────────────────────────────────────────
name: C++ CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Docs/**"
      - "Doxygen/**"
      - "AITraining/**"
      - ".prompts/**"
      - ".review/**"
      - ".tasks/**"
      - "translations/**"
      - "LICENSE"
      - ".github/workflows/Build-Release-Ver-ci.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Docs/**"
      - "Doxygen/**"
      - "AITraining/**"
      - ".prompts/**"
      - ".review/**"
      - ".tasks/**"
      - "translations/**"
      - ".github/workflows/Build-Release-Ver-ci.yml"
  workflow_dispatch:

concurrency:
  group: cpp-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_INSTALLED_DIR: D:/v
  VCPKG_MAX_CONCURRENCY: 4
  # Enable vcpkg binary caching via GitHub Actions Cache
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  # libaec version pinned to match vcpkg baseline 9432c416
  LIBAEC_VERSION: "1.1.6"

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Export GitHub Actions cache env for vcpkg binary caching ──────
      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── Create vcpkg triplet overlay (release-only) ─────────────────
      - name: Create release-only triplet overlay
        shell: pwsh
        run: |
          $tripletDir = "custom-triplets"
          New-Item -ItemType Directory -Path $tripletDir -Force | Out-Null
          @"
          set(VCPKG_TARGET_ARCHITECTURE x64)
          set(VCPKG_CRT_LINKAGE dynamic)
          set(VCPKG_LIBRARY_LINKAGE dynamic)
          set(VCPKG_BUILD_TYPE release)
          "@ | Out-File -Encoding utf8 "$tripletDir/x64-windows.cmake"
          Write-Host "Created release-only triplet at $tripletDir/x64-windows.cmake"

      # ── Qt6 (cached by install-qt-action) ─────────────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.*"
          modules: "qtimageformats"
          cache: true

      # ── vcpkg with Binary Caching ─────────────────────────────────────
      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-${{ runner.os }}-rel-${{ hashFiles('vcpkg.json') }}-9432c416
          restore-keys: |
            vcpkg-${{ runner.os }}-rel-${{ hashFiles('vcpkg.json') }}-
            vcpkg-${{ runner.os }}-rel-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "9432c416e5c543eded0b4df35a4d347b2e669208"
          vcpkgJsonGlob: "vcpkg.json"

      # ── Overlay port: redirect libaec from blocked GitLab → GitHub mirror ─
      - name: Create libaec overlay port (GitHub mirror)
        shell: pwsh
        run: |
          $ver = $env:LIBAEC_VERSION

          # Download from GitHub — reliably accessible from Actions runners
          $githubUrl = "https://github.com/MathisRosenhauer/libaec/archive/refs/tags/v$ver.tar.gz"
          $tmpFile   = "$env:TEMP/libaec-github-v$ver.tar.gz"
          Write-Host "Downloading libaec v$ver from GitHub mirror..."
          Invoke-WebRequest -Uri $githubUrl -OutFile $tmpFile -UseBasicParsing -TimeoutSec 120

          # Compute SHA512 so the portfile hash matches exactly
          $sha512 = (Get-FileHash -Path $tmpFile -Algorithm SHA512).Hash.ToLower()
          Write-Host "SHA512: $sha512"

          # Place archive in vcpkg downloads directory (vcpkg will reuse it)
          $dlDir = "$env:VCPKG_ROOT/downloads"
          New-Item -ItemType Directory -Path $dlDir -Force | Out-Null
          Copy-Item $tmpFile "$dlDir/MathisRosenhauer-libaec-v$ver.tar.gz" -Force

          # Create overlay port directory
          $portDir = "${{ github.workspace }}/custom-ports/libaec"
          New-Item -ItemType Directory -Path $portDir -Force | Out-Null

          # portfile.cmake — uses vcpkg_from_github instead of vcpkg_from_gitlab
          @"
          vcpkg_from_github(
              OUT_SOURCE_PATH SOURCE_PATH
              REPO MathisRosenhauer/libaec
              REF "v$ver"
              SHA512 $sha512
              HEAD_REF master
          )

          vcpkg_cmake_configure(
              SOURCE_PATH "`${SOURCE_PATH}"
              OPTIONS
                  -DBUILD_TESTING=OFF
          )

          vcpkg_cmake_install()
          vcpkg_cmake_config_fixup(CONFIG_PATH lib/cmake/libaec)
          vcpkg_fixup_pkgconfig()

          file(REMOVE_RECURSE "`${CURRENT_PACKAGES_DIR}/debug/include")
          vcpkg_install_copyright(FILE_LIST "`${SOURCE_PATH}/LICENSE.txt")
          "@ | Out-File -Encoding utf8 "$portDir/portfile.cmake"

          # vcpkg.json for the port
          @"
          {
            "name": "libaec",
            "version": "$ver",
            "description": "Adaptive Entropy Coding library",
            "homepage": "https://github.com/MathisRosenhauer/libaec",
            "dependencies": [
              { "name": "vcpkg-cmake", "host": true },
              { "name": "vcpkg-cmake-config", "host": true }
            ]
          }
          "@ | Out-File -Encoding utf8 "$portDir/vcpkg.json"

          Write-Host "Overlay port created at: $portDir"

      # ── MSVC ──────────────────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ── Configure ─────────────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_INSTALLED_DIR=$env:VCPKG_INSTALLED_DIR" `
            "-DVCPKG_INSTALL_OPTIONS=--clean-after-build" `
            "-DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/custom-triplets" `
            "-DVCPKG_OVERLAY_PORTS=${{ github.workspace }}/custom-ports" `
            "-DCMAKE_BUILD_TYPE=Release" `
            "-DBUILD_TESTING=ON"

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      # ── Test ──────────────────────────────────────────────────────────
      - name: Run Tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Disable Windows Error Reporting UI which hangs CI on crash/missing DLLs
          Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting" -Name "DontShowUI" -Value 1 -ErrorAction SilentlyContinue
          
          # Add vcpkg bin directory to PATH so tests can find DLLs (OpenCV, PCL, etc.)
          $env:PATH = "$env:VCPKG_INSTALLED_DIR\x64-windows\bin;$env:PATH"
          
          ctest --test-dir build -C Release --output-on-failure --timeout 120
