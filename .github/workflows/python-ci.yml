# ──────────────────────────────────────────────────────────────────────────────
# Python CI — Lint & Validate AITraining
# Lightweight (~30s), only triggers on Python changes.
# ──────────────────────────────────────────────────────────────────────────────
name: Python CI

on:
  push:
    branches: [main]
    paths: ["AITraining/**"]
  pull_request:
    branches: [main]
    paths: ["AITraining/**"]
  workflow_dispatch:

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: AITraining/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check AITraining/ --output-format=github

      - name: Syntax check
        run: python -m py_compile AITraining/TrainModel.py && python -m py_compile AITraining/StartChatbotServer.py
