# ──────────────────────────────────────────────────────────────────────────────
# C++ CI — Build & Test
# Triggers on push/PR to main, skips docs-only changes.
# Uses aggressive caching to minimize build time and token usage.
# ──────────────────────────────────────────────────────────────────────────────
name: C++ CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Docs/**"
      - "Doxygen/**"
      - "AITraining/**"
      - ".prompts/**"
      - ".review/**"
      - ".tasks/**"
      - "translations/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "Docs/**"
      - "Doxygen/**"
      - "AITraining/**"
      - ".prompts/**"
      - ".review/**"
      - ".tasks/**"
      - "translations/**"
  workflow_dispatch:

concurrency:
  group: cpp-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_INSTALLED_DIR: D:/v
  VCPKG_MAX_CONCURRENCY: 2
  VCPKG_BUILD_TYPE: release

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Qt6 (cached by install-qt-action) ─────────────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.*"
          modules: "qtimageformats"
          cache: true

      # ── vcpkg with Binary Caching ─────────────────────────────────────
      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_INSTALLED_DIR }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "9432c416e5c543eded0b4df35a4d347b2e669208"
          vcpkgJsonGlob: "vcpkg.json"

      # ── MSVC ──────────────────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ── Configure ─────────────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build -S . `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            "-DVCPKG_INSTALLED_DIR=$env:VCPKG_INSTALLED_DIR" `
            "-DVCPKG_INSTALL_OPTIONS=--clean-after-build" `
            "-DBUILD_TESTING=ON"

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      # ── Test ──────────────────────────────────────────────────────────
      - name: Run Tests
        shell: pwsh
        run: ctest --test-dir build --config Release --output-on-failure --timeout 120
